<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
</head>
<body>
    <h1 class="text-white">Forget Password</h1>
    <form method="post" action="{% url 'forget_password' %}">
        {% csrf_token %}
        <input type="password" name="new-password" placeholder="New Password">
        <input type="password" name="confirm-password" placeholder="Confirm New Password">
        <button type="submit">Update Password</button>
    </form>

    {% if messages %}
        {% for message in messages %}
        <p style="color: {% if message.tags == 'error' %}red{% elif message.tags == 'success' %}green{% else %}blue{% endif %};">{{ message }}</p>
        {% endfor %}
    {% endif %}

</body>
</html>
